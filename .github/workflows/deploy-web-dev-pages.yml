name: Deploy web-dev to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web-dev/**'
      - '.github/workflows/deploy-web-dev-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-dev/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_ACTIONS: 'true'
          VITE_USE_HASH_ROUTER: 'true'
          VITE_PUBLIC_BASE: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AMAP_KEY: ${{ vars.VITE_AMAP_KEY }}
          VITE_AMAP_SECURITY_JS_CODE: ${{ vars.VITE_AMAP_SECURITY_JS_CODE }}
          VITE_EXECUTION_SERVICE_URL: ${{ vars.VITE_EXECUTION_SERVICE_URL }}
          VITE_MQTT_GATEWAY_URL: ${{ vars.VITE_MQTT_GATEWAY_URL }}
          VITE_WIFI_DEMO_DEVICE_ID: ${{ vars.VITE_WIFI_DEMO_DEVICE_ID }}
          VITE_WIFI_DEMO_STATIONS: ${{ vars.VITE_WIFI_DEMO_STATIONS }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dev/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
