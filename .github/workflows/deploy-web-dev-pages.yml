name: Deploy web-dev to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web-dev/**'
      - '.github/workflows/deploy-web-dev-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-dev/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_ACTIONS: 'true'
          VITE_USE_HASH_ROUTER: 'true'
          VITE_SUPABASE_URL: https://obmivbdzncewlaybtjuc.supabase.co
          VITE_SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ibWl2YmR6bmNld2xheWJ0anVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjU2MzAsImV4cCI6MjA5MjUwMTYzMH0.yhp4i_dBVmkP9MXKyIOIrLdyJ2ZC6rDDODSWlmq8GOc'
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dev/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
